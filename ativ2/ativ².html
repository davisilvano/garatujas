<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Inscrição para o Campeonato de Taekwondo</title>
  <link rel="stylesheet" href="style12.css">
</head>

<body>
  <form method="get">
    <h1>Inscrição para o 69° Campeonato de Taekwondo STF de Cornélio Pintópolis-CU</h1>
    <div>
        <label>Nome completo:</label>
            <input type="text" required>
    </div>
    <div>
        <label>Idade:</label>
            <input type="number" required>
    </div>
    <div>
        <label>Data de nascimento:</label>
            <input type="date" required>
    </div>
    <div>
        <label>Email:</label>
            <input type="email" required>
    </div>
    <div>
        <label>Telefone do responsável:</label>
            <input type="tel">
    </div>
    <div>
        <label>Faixa:</label>
            <select>
                <option>Branca</option>
                <option>Cinza</option>
                <option>Amarela</option>
                <option>Laranja</option>
                <option>Verde</option>
                <option>Roxa</option>
                <option>Azul</option>
                <option>Marrom</option>
                <option>Vermelha</option>
                <option>Vermelha e Preta</option>
                <option>Preta</option>
            </select>
    </div>
    <div>
        <label>Peso (kg):</label>
            <input type="number" required>
    </div>
    <div>
        <label>Categoria:</label>
            <select>
                <option>Infantil</option>
                <option>Juvenil</option>
                <option>Adulto</option>
            </select>
    </div>
    <div> 
        <label>Tipo de competição:</label>
            <input type="checkbox" name="tipo"> Luta
            <input type="checkbox" name="tipo"> Luta de Bastão
            <input type="checkbox" name="tipo"> Poomsae (Fórmula)
            <input type="checkbox" name="tipo"> Fórmula de Armas
    </div>
    <div>
        <label>Já participou de campeonatos?</label>
            <input type="radio" name="participou"> Sim
            <input type="radio" name="participou"> Não
    </div>
    <div>
        <label>Observações:</label>
            <textarea rows="4"></textarea>
    </div>
    <div>
        <label>
            <input type="checkbox" required> Aceito os termos
        </label>
    </div>
        <button type="submit">Enviar inscrição</button>
       </form>
   <footer>
    Rua Eduardo Okuno Pinto, 420 – Nova Conguitos, Provetópolis-CU, 69677-420 
   </footer>
</body>
</html>
